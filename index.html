<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Georgia Tech Emoji Sentiment Study</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
        }

        h1 {
            color: #FFC72C;
            letter-spacing: 2px;
        }

        button {
            padding: 12px 22px;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .gold { background-color: #FFC72C; color: black; }
        .red { background-color: #AA0000; color: white; }
        .green { background-color: #008000; color: white; }
        .gray { background-color: #555; color: white; }

        .hidden { display: none; }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #333;
            border-radius: 15px;
            margin: 20px 0;
            height: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #FFC72C;
            border-radius: 15px;
            text-align: center;
            line-height: 25px;
            font-weight: bold;
            color: black;
            transition: width 0.3s ease-in-out;
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px #FFC72C; }
            50% { box-shadow: 0 0 20px #FFC72C; }
            100% { box-shadow: 0 0 5px #FFC72C; }
        }
    </style>
</head>

<body>

<div class="container">

    <div id="start">
        <h1>GEORGIA TECH EMOJI SENTIMENT STUDY</h1>
        <h2>Hosted by Rob Bundy</h2>
        <p>Enter Participant ID:</p>
        <input id="pid" type="text">
        <br><br>
        <button class="gold" onclick="goConsent()">Begin Study</button>
    </div>

    <div id="consent" class="hidden">
        <h1>Informed Consent</h1>
        <p>
            Participation is voluntary.<br>
            You may withdraw at any time.<br>
            Responses are anonymous.
        </p>
        <button class="gold" onclick="startSurvey()">I Agree</button>
    </div>

    <div id="survey" class="hidden">
        <h2 id="progress"></h2>

        <div class="progress-container">
            <div id="progressBar" class="progress-bar">0%</div>
        </div>

        <p id="question" style="font-size:20px;"></p>

        <button class="gold" onclick="selectResponse('positive')">Positive 👍</button>
        <button class="red" onclick="selectResponse('negative')">Negative 👎</button>

        <div>
            <p>Confidence (1–5)</p>
            <div id="confidence"></div>
        </div>

        <button class="green" onclick="nextQuestion()">Next</button>
    </div>

    <div id="finish" class="hidden">
        <h1>Study Complete</h1>
        <p>Your responses have been downloaded.</p>
    </div>

</div>

<script>

    let congruent = [
        "I finally got the research grant I’ve been stressing over! 🥂",
        "My laptop just blue-screened in the middle of a 2-hour exam. 💀",
        "The professor just gave me an extension without me even asking. 😇",
        "I just realized I’ve been muted for the last 10 minutes of my presentation. 🤡",
        "Seeing my name on the final graduation list feels so surreal. ✨",
        "I’ve had four cups of coffee and I still can't process this textbook. 😵‍💫",
        "Someone just left a huge dent in my car and didn't leave a note. 🤬",
        "The curve on the midterm was so generous that I actually passed. 😮‍💨",
        "I just found out my favorite professor is retiring this semester. 💔",
        "That feeling when you submit the final paper of your degree. 🌊"
    ];

    let contradictory = [
        "My advisor described my career goals as 'uniquely ambitious.' 🤗",
        "I just saw my ex and their new 'friend' posted a photo at our spot. ✨",
        "The TA said my essay was 'certainly one of the papers of all time.' 🥰",
        "My parents just sent me a link to a 'Life Skills' YouTube playlist. 🌈",
        "I just realized my internship supervisor is younger than I am. 🥳",
        "I've been 'studying' with this group for five hours and we haven't opened a book. 📈",
        "My roommate invited their 'long-term guest' to sleep on our couch. 🌟",
        "I accidentally sent a screenshot of the group chat to the group chat. 💅",
        "Just got assigned a 20-minute presentation on a topic I heard of today. 🥂",
        "I haven't checked my GPA in three semesters and I'm doing just fine. 🤗"
    ];

    let control = [
        "The registrar’s office sent an automated update regarding my status.",
        "I am waiting for the department to release the final grades.",
        "The professor mentioned my contribution during the seminar today.",
        "I spent the afternoon revising the bibliography for my thesis.",
        "There is a discrepancy between the lecture notes and the exam.",
        "My advisor suggested I look into a different elective for next term.",
        "I am currently re-evaluating the scope of my independent study.",
        "The library is staying open later during the finals period.",
        "I received a notification about a change in the course syllabus.",
        "We are meeting at the student union to discuss the project."
    ];

    let questions = [...congruent, ...contradictory, ...control];
    questions = questions.sort(() => Math.random() - 0.5);

    let current = 0;
    let responses = [];
    let selected = null;
    let confidence = null;
    let startTime = null;
    let participantID = "";

    function goConsent(){
        participantID = document.getElementById("pid").value;
        if(!participantID){ alert("Enter Participant ID"); return; }
        document.getElementById("start").classList.add("hidden");
        document.getElementById("consent").classList.remove("hidden");
    }

    function startSurvey(){
        document.getElementById("consent").classList.add("hidden");
        document.getElementById("survey").classList.remove("hidden");
        showQuestion();
    }

    function showQuestion(){
        selected = null;
        confidence = null;
        startTime = Date.now();

        document.getElementById("progress").innerText =
            "Question " + (current+1) + " of " + questions.length;

        let percent = Math.round(((current+1)/questions.length)*100);
        let bar = document.getElementById("progressBar");
        bar.style.width = percent + "%";
        bar.innerText = percent + "%";

        if(current === questions.length-1){
            bar.classList.add("pulse");
        } else {
            bar.classList.remove("pulse");
        }

        document.getElementById("question").innerText = questions[current];

        let confDiv = document.getElementById("confidence");
        confDiv.innerHTML = "";
        for(let i=1;i<=5;i++){
            let btn = document.createElement("button");
            btn.innerText = i;
            btn.className = "gray";
            btn.onclick = () => {
                confidence = i;
                for(let b of confDiv.children){
                    b.style.backgroundColor = "#555";
                }
                btn.style.backgroundColor = "#FFC72C";
            };
            confDiv.appendChild(btn);
        }
    }

    function selectResponse(resp){
        selected = resp;
    }

    function nextQuestion(){
        if(!selected){ alert("Select Positive or Negative"); return; }
        if(!confidence){ alert("Select Confidence"); return; }

        let rt = (Date.now() - startTime)/1000;

        responses.push({
            participant_id: participantID,
            question_number: current+1,
            question_text: questions[current],
            response: selected,
            confidence: confidence,
            reaction_time_seconds: rt,
            timestamp: new Date().toISOString()
        });

        current++;
        if(current < questions.length){
            showQuestion();
        } else {
            finish();
        }
    }

    function finish(){
        let blob = new Blob([JSON.stringify(responses,null,4)],
            {type:"application/json"});
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "responses_" + participantID + ".json";
        a.click();

        document.getElementById("survey").classList.add("hidden");
        document.getElementById("finish").classList.remove("hidden");
    }

</script>

</body>
</html>
